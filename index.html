```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicine Finder</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:40px;
}

.container{
    max-width:550px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    margin-bottom:25px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:15px;
    margin-bottom:8px;
}

select,
input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

.result{
    margin-top:25px;
    padding:15px;
    background:#f9f9f9;
    border-radius:8px;
    font-weight:bold;
}

.dose-container{
    display:none;
    gap:15px;
    margin-top:20px;
}

.dose-box{
    flex:1;
    background:#f4f4f4;
    padding:15px;
    border-radius:10px;
}

.dose-title{
    font-weight:bold;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

    <h2>Medicine Finder</h2>

    <!-- Active Ingredient -->
    <label>Active Ingredient</label>

    <select id="ingredientSelect">
        <option value="">Select Active Ingredient</option>
        <option value="Paracetamol">Paracetamol</option>
        <option value="Cetrizine">Cetrizine</option>
    </select>

    <!-- Brand Name -->
    <label>Brand Name</label>

    <select id="brandSelect" disabled>
        <option value="">Select Brand Name</option>
    </select>

    <!-- Weight -->
    <div id="weightDiv" style="display:none;">

        <label>Weight (kg)</label>

        <input
            type="number"
            id="weightInput"
            placeholder="Enter weight in kg"
        >

    </div>

    <!-- Age -->
    <div id="ageDiv" style="display:none;">

        <label>Age (Years)</label>

        <input
            type="number"
            id="ageInput"
            placeholder="Enter age in years"
        >

    </div>

    <!-- Dose Boxes -->
    <div class="dose-container" id="doseContainer">

        <div class="dose-box">

            <div class="dose-title">
                Minimum Dose
            </div>

            <div id="minDose">
                -
            </div>

        </div>

        <div class="dose-box">

            <div class="dose-title">
                Maximum Dose
            </div>

            <div id="maxDose">
                -
            </div>

        </div>

    </div>

    <!-- Age Result -->
    <div
        id="ageResult"
        class="result"
        style="display:none;"
    >
        -
    </div>

</div>

<script>

const medicines = {

    Paracetamol: [

        {
            name: "Adol 120 mg / 5 ml Syrup",
            concentration: 120,
            type: "weight"
        },

        {
            name: "Adol 250 mg / 5 ml Syrup",
            concentration: 250,
            type: "weight"
        },

        {
            name: "Panadol 240 mg / 5 ml Syrup",
            concentration: 240,
            type: "weight"
        }

    ],

    Cetrizine: [

        {
            name: "Zyrtec Syrup",
            type: "age"
        }

    ]

};

const ingredientSelect =
    document.getElementById("ingredientSelect");

const brandSelect =
    document.getElementById("brandSelect");

const weightDiv =
    document.getElementById("weightDiv");

const weightInput =
    document.getElementById("weightInput");

const ageDiv =
    document.getElementById("ageDiv");

const ageInput =
    document.getElementById("ageInput");

const doseContainer =
    document.getElementById("doseContainer");

const minDose =
    document.getElementById("minDose");

const maxDose =
    document.getElementById("maxDose");

const ageResult =
    document.getElementById("ageResult");

// ============================
// Ingredient Change
// ============================

ingredientSelect.addEventListener("change", () => {

    const selectedIngredient =
        ingredientSelect.value;

    brandSelect.innerHTML =
        '<option value="">Select Brand Name</option>';

    brandSelect.disabled = true;

    weightDiv.style.display = "none";
    ageDiv.style.display = "none";
    doseContainer.style.display = "none";
    ageResult.style.display = "none";

    weightInput.value = "";
    ageInput.value = "";

    if (!selectedIngredient) return;

    medicines[selectedIngredient].forEach((medicine) => {

        const option =
            document.createElement("option");

        option.value = medicine.name;
        option.textContent = medicine.name;

        brandSelect.appendChild(option);

    });

    brandSelect.disabled = false;

});

// ============================
// Brand Change
// ============================

brandSelect.addEventListener("change", () => {

    weightDiv.style.display = "none";
    ageDiv.style.display = "none";
    doseContainer.style.display = "none";
    ageResult.style.display = "none";

    const ingredient =
        ingredientSelect.value;

    const brand =
        brandSelect.value;

    if (!brand) return;

    const selectedMedicine =
        medicines[ingredient].find(
            med => med.name === brand
        );

    // Weight-based medicines
    if (selectedMedicine.type === "weight") {

        weightDiv.style.display = "block";
        doseContainer.style.display = "flex";

        calculateParacetamolDose();

    }

    // Age-based medicines
    if (selectedMedicine.type === "age") {

        ageDiv.style.display = "block";
        ageResult.style.display = "block";

    }

});

// ============================
// Paracetamol Dose Calculation
// ============================

function calculateParacetamolDose() {

    const ingredient =
        ingredientSelect.value;

    const brand =
        brandSelect.value;

    const weight =
        parseFloat(weightInput.value);

    if (!weight || !brand) {

        minDose.innerHTML = "-";
        maxDose.innerHTML = "-";

        return;

    }

    const selectedMedicine =
        medicines[ingredient].find(
            med => med.name === brand
        );

    const concentration =
        selectedMedicine.concentration;

    // Minimum Dose
    const min =
        (10 * weight * 5) / concentration;

    // Maximum Dose
    const max =
        (15 * weight * 5) / concentration;

    minDose.innerHTML =
        min.toFixed(1) + " ml";

    maxDose.innerHTML =
        max.toFixed(1) + " ml";

}

// Auto recalculate on weight input
weightInput.addEventListener("input", () => {

    calculateParacetamolDose();

});

// ============================
// Age-Based Calculation
// ============================

```javascript
ageInput.addEventListener("input", () => {

    const age =
        parseFloat(ageInput.value);

    if (!age) {

        ageResult.innerHTML = "-";
        return;

    }

    // 2 - 5 years
    if (age >= 2 && age <= 5) {

        ageResult.innerHTML =
            "Recommended Dose: 2.5 ml OD or BID";

    }

    // 6 - 11 years
    else if (age >= 6 && age <= 11) {

        ageResult.innerHTML =
            "Recommended Dose: 5 ml OD or BID";

    }

    // 12 years and older
    else if (age >= 12) {

        ageResult.innerHTML =
            "Recommended Dose: 10 ml OD";

    }

    else {

        ageResult.innerHTML =
            "Please consult doctor/pharmacist";

    }

});

</script>

</body>
</html>
