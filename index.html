<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pediatric Dose Calculator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    box-sizing:border-box;
}

#result{
    margin-top:20px;
}

.warning{
    color:red;
    font-weight:bold;
}

.warning-box{
    background:#ffe5e5;
    border:1px solid red;
    color:red;
    padding:15px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
}

.search-box{
    position:relative;
    margin-bottom:15px;
}

.search-box input{
    width:100%;
    padding:14px 15px;
    font-size:16px;
    border:2px solid #d6e8ff;
    border-radius:12px;
    outline:none;
    transition:0.2s;
    background:white;
}

.search-box input:focus{
    border-color:#4a90e2;
    box-shadow:0 0 8px rgba(74,144,226,0.3);
}   
.dose-grid{
    display:flex;
    gap:10px;
}

.dose-box{
    flex:1;
    background:#eef7ff;
    border-radius:10px;
    padding:15px;
    text-align:center;
    border:1px solid #d6e8ff;
}

.dose-title{
    font-weight:bold;
    margin-bottom:10px;
}

.dose-value{
    font-size:24px;
    font-weight:bold;
    color:#0066cc;
}

.dose-note{
    margin-top:8px;
    font-size:14px;
}

.single-dose{
    max-width:300px;
    margin:auto;
}
</style>
</head>
<body>

<div class="container">

<h2>Medicine Dose Calculator</h2>

<div class="search-box">
    <input list="medicineList"
           id="medicine"
           placeholder="Search medicine..."
           autocomplete="off">
</div>

<datalist id="medicineList">
<option value="Adol 120mg/5ml Syrup">
<option value="Adol 250mg/5ml Syrup">
<option value="Adol Drops">
<option value="Adol Suppository">
<option value="Panadol 240mg/5ml Syrup">
<option value="Brufen Syrup">
<option value="Zyrtec / Cetralon Syrup">
<option value="Zyrtec Drops">
</datalist>

<div id="dynamicArea"></div>

<div id="result"></div>

</div>

<script>

const medicineInput = document.getElementById("medicine");
const dynamicArea = document.getElementById("dynamicArea");
const result = document.getElementById("result");

medicineInput.addEventListener("input", renderInputs);
medicineInput.addEventListener("change", renderInputs);
    
function renderInputs(){

    result.innerHTML="";
    dynamicArea.innerHTML="";

    const med = medicineInput.value;

    // Weight Based
    if([
        "Adol 120mg/5ml Syrup",
        "Adol 250mg/5ml Syrup",
        "Adol Drops",
        "Adol Suppository",
        "Panadol 240mg/5ml Syrup",
        "Brufen Syrup"
    ].includes(med))
    {
        let html="";

        if(med==="Adol Drops"){
            html+=`
            <label>Calculate By</label>
            <select id="dropMode" onchange="calculate()">           
                <option value="ml">mL</option>
                <option value="drops">Drops</option>
            </select>
            `;
        }

        html+=`
        <label>Weight (kg)</label>
        <input type="number" id="weight" step="0.1" oninput="calculate()">
        `;

        dynamicArea.innerHTML=html;
    }

    // Age Based
    else if(
        med==="Zyrtec / Cetralon Syrup" ||
        med==="Zyrtec Drops"
    )
    {
        dynamicArea.innerHTML=`
        <label>Age Type</label>
        <select id="ageType" onchange="showAgeInput()">
          <option value="">Select Age Type</option>
          <option value="months">Age in Months</option>
          <option value="years">Age in Years</option>
</select>

<div id="ageContainer"></div>
`;
    }

    setTimeout(() => {
        calculate();
    }, 0);

function showAgeInput(){

    const ageType = document.getElementById("ageType").value;
    const ageContainer = document.getElementById("ageContainer");

    if(!ageType){
        ageContainer.innerHTML="";
        result.innerHTML="";
        return;
    }

    ageContainer.innerHTML=`
        <label>Enter Age</label>
        <input type="number"
               id="age"
               step="0.1"
               min="0"
               oninput="calculate()">
    `;
}
    
function calculate(){

    const med = medicineInput.value;

    // WEIGHT BASED

    if(document.getElementById("weight")){

        let w = parseFloat(document.getElementById("weight").value);

        if(isNaN(w)){
            result.innerHTML="";
            return;
}

        let text="";

        if(med==="Adol 120mg/5ml Syrup"){

            let min=(10*w*5/120).toFixed(1);
            let max=(15*w*5/120).toFixed(1);

            text=`Minimum: ${min} mL Q6hr or Q8hr
Maximum: ${max} mL Q6hr or Q8hr`;
        }

        else if(med==="Adol 250mg/5ml Syrup"){

            let min=(10*w*5/250).toFixed(1);
            let max=(15*w*5/250).toFixed(1);

            text=`Minimum: ${min} mL Q6hr or Q8hr
Maximum: ${max} mL Q6hr or Q8hr`;
        }

        else if(med==="Adol Drops"){

            let mode=document.getElementById("dropMode").value;

            if(mode==="ml"){

                let min=(10*w*1/100).toFixed(1);
                let max=(15*w*1/100).toFixed(1);

                text=`Minimum: ${min} mL Q6hr or Q8hr
Maximum: ${max} mL Q6hr or Q8hr`;
            }

            else{

                let min=(10*w*1/100*20).toFixed(0);
                let max=(15*w*1/100*20).toFixed(0);

                text=`Minimum: ${min} drops Q6hr or Q8hr
Maximum: ${max} drops Q6hr or Q8hr`;
            }
        }

        else if(med==="Adol Suppository"){

            let dose=15*w;

            if(dose<125){
                text="Can't use Adol Suppository";
            }
            else if(dose<250){
                text="Adol 125mg Suppository Q8hr";
            }
            else if(dose<500){
                text="Adol 250mg Suppository Q8hr";
            }
            else{
                text="Adol 500mg Suppository Q8hr";
            }
        }

        else if(med==="Panadol 240mg/5ml Syrup"){

            let min=(10*w*5/240).toFixed(1);
            let max=(15*w*5/240).toFixed(1);

            text=`Minimum: ${min} mL Q6hr or Q8hr
Maximum: ${max} mL Q6hr or Q8hr`;
        }

        else if(med==="Brufen Syrup"){

            let min=(5*w*5/100).toFixed(1);
            let max=(10*w*5/100).toFixed(1);

            text=`Minimum: ${min} mL Q8hr
Maximum: ${max} mL Q8hr`;
        }

        result.innerHTML=text;
    }

    // AGE BASED

    if(document.getElementById("age")){

        let age=parseFloat(document.getElementById("age").value);
        let ageTypeElement = document.getElementById("ageType");

if(!ageTypeElement) return;

let type = ageTypeElement.value;

if(!type) return;
        
    if(isNaN(age)){
         result.innerHTML="";
         return;
}

        let months=(type==="years") ? age*12 : age;

        let text="";

        if(med==="Zyrtec / Cetralon Syrup"){

            if(months<24){
                result.innerHTML=`
                <div class="warning-box">
                Not recommended unless prescribed by a doctor
                </div>
                `;
                return;
            }
            else if(months<72){
                text="2.5 mL OD (Maximum 5 mL OD)";
            }
            else if(months<144){
                text="5 mL OD (Maximum 10 mL OD)";
            }
            else{
                text="10 mL OD";
            }
        }

        else if(med==="Zyrtec Drops"){

            if(months<6){
                 result.innerHTML=`
                 <div class="warning-box">
                 Not recommended unless prescribed by a doctor
                 </div>
                 return;
            }
            else if(months<24){
                text="5 drops OD";
            }
            else if(months<72){
                text="5 drops OD (Maximum 10 drops OD)";
            }
            else if(months<144){
                text="10 drops OD (Maximum 20 drops OD)";
            }
            else{
                text="20 drops OD";
            }
        }

        result.innerHTML=text;
    }
}

</script>

</body>
</html>
