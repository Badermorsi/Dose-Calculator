<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pediatric Dose Calculator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#f4f6ff,#eef7ff);
    padding:15px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:15px;
    color:#1f3b73;
}

.input-group {
    margin-top: 12px;
    padding: 14px;
    background: #f7faff;
    border: 1px solid #e6f0ff;
    border-radius: 14px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    font-weight: 600;
    color: #2c3e50;
}

/* unified input look */
.search-box input,
input[type="number"],
select {
    width: 100%;
    padding: 14px 14px;
    border-radius: 14px;
    border: 1px solid #d6e8ff;
    font-size: 15px;
    background: #f9fbff;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
    transition: all 0.25s ease;
}

.search-box{
    width: 92%;
    margin-bottom: 15px;
    position: relative;
}
    
.search-box input:focus,
input[type="number"]:focus,
select:focus {
    border-color: #4a90e2;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(74,144,226,0.15);
    outline: none;
}

/* SEARCH BOX ICON UPGRADE */
.search-box {
    position: relative;
    margin-bottom: 15px;
}

.search-box input {
    padding-left: 42px;
}

.search-box::before {
    content: "💊";
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    opacity: 0.7;
}
    
/* RESULT AREA */
#result{
    margin-top:20px;
}

/* WARNING */
.warning-box{
    background:#ffe5e5;
    border:1px solid #ff4d4d;
    color:#b30000;
    padding:14px;
    border-radius:12px;
    text-align:center;
    font-weight:bold;
}

/* DOSE CARDS */
.dose-grid{
    display:flex;
    gap:12px;
    margin-top:15px;
    flex-wrap:wrap;
}

@media (max-width:600px){
    .dose-column {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
}
}

.dose-column{
    flex:1;
}

.dose-heading {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
    color: #333;
}

.dose-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 12px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.06);
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.dose-value{
    font-size:22px;
    font-weight:bold;
    color:#0b63ce;
    white-space:nowrap;
}

.dose-note{
    margin-top:6px;
    font-size:13px;
    color:#666;
    white-space:nowrap;
}

.special-note{
    font-size:16px;
    font-weight:600;
    color:#333;
}
    
/* SINGLE CARD */
.single-dose{
    max-width:300px;
    margin:auto;
}

/* REMOVE NUMBER INPUT SPINNERS */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

input[type=number] {
    -moz-appearance: textfield;
}

.small-input-box{
    max-width: 220px;
    margin: 15px auto;
    text-align: center;
}

.small-input-box input{
    text-align: center;
    font-size: 18px;
    font-weight: 600;
}

.small-input-box label{
    text-align: center;
}

.avg-weight-box{
    width: 240px;

    background: linear-gradient(145deg, #ffffff, #f7faff);
    border: 1px solid #d6e8ff;
    border-radius: 16px;
    padding: 14px;

    box-shadow: 0 10px 25px rgba(0,0,0,0.08);

    text-align: center;
    font-family: Arial, sans-serif;
}

.widget-stack{
    position: fixed;
    top: 15px;
    left: 15px;

    display: flex;
    flex-direction: column;
    gap: 12px;

    z-index: 1000;
}

#mounjaroContent{
    overflow: hidden;
    transition: all 0.25s ease;
}

#mounjaroBody{
    margin-top: 10px;
}
    
.result-box{
    margin-top: 12px;
    font-size: 16px;
    font-weight: bold;
    color: #0b63ce;
}
    
/* TITLE (smaller + cleaner) */
.avg-weight-box h3{
    margin: 0;
    font-size: 14px;
    color: #1f3b73;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
}
    
/* INPUT */
.avg-weight-box input{
    width: 90%;
    padding: 6px 8px;
    font-size: 13px;
    border-radius: 8px;
    border: 1px solid #cfe2ff;
    outline: none;
    text-align: center;
    transition: 0.2s;
}

.avg-weight-box input:focus{
    border-color: #4a90e2;
    box-shadow: 0 0 0 3px rgba(74,144,226,0.15);
}

/* RESULT */
#avgResult{
    margin-top: 10px;
    font-size: 13px;
    font-weight: 600;
    color: #0b63ce;
}

/* warning style (if you use red text) */
#avgResult span{
    color: #d10000;
    font-weight: 700;
}

.avg-header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    padding: 2px 4px;
}

.avg-header h3{
    font-size: 13px;
    margin: 0;
    color: #1f3b73;
}

#avgToggle{
    font-size: 14px;
    color: #4a90e2;
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
}

#avgToggle:hover{
    transform: scale(1.2);
}

.avg-body{
    margin-top: 10px;
    transition: all 0.25s ease;
}
   
.avg-weight-box.collapsed .avg-body{
    display: none;
}

#avgAge{
    width: 70%;
    max-width: 120px;
    padding: 5px 6px;
    font-size: 12px;
    border-radius: 6px;
    text-align: center;
    display: block;
    margin: 6px auto;
}

#arrow,
#mounjaroArrow{
    color:#1f3b73;
}
    
.auto-badge{
    margin-top:8px;
    font-size:11px;
    padding:4px 8px;
    border-radius:20px;
    background:#0b63ce;
    color:white;
    display:none;
    width:fit-content;
    margin-left:auto;
    margin-right:auto;
}
    
</style>
</head>

<body>

<div class="widget-stack">

    <!-- 1. Average Weight -->
<div class="avg-weight-box collapsed" id="avgBox">
        <h3 onclick="toggleAvgBox()" style="cursor:pointer;">
            Average weight calculator <span id="arrow">▶</span>
        </h3>

    <div class="avg-body" id="avgContent">            
    <label>Age (years)</label>
            <input type="number"
                   id="avgAge"
                   placeholder="Enter age"
                   oninput="calculateAverageWeight()">

            <div id="avgResult"></div>
            <div id="autoBadge" class="auto-badge">AUTO weight active</div>
        </div>

    </div>

    <!-- 2. Mounjaro Clicks -->
    <div class="avg-weight-box collapsed" id="mounjaroBox">

 <div class="avg-header" onclick="toggleMounjaroBox()">

    <h3>Mounjaro Clicks</h3>

    <span id="mounjaroArrow">▶</span>

</div>

    <div class="avg-body" id="mounjaroBody">
            <label>Mounjaro Pen Strength</label>
            <select id="penStrength" onchange="calculateMounjaroClicks()">
                <option value="">Select</option>
                <option value="2.5">2.5 mg</option>
                <option value="5">5 mg</option>
                <option value="7.5">7.5 mg</option>
                <option value="10">10 mg</option>
                <option value="12.5">12.5 mg</option>
                <option value="15">15 mg</option>
            </select>

            <br><br>

            <label>Dose Required</label>
            <select id="doseRequired" onchange="calculateMounjaroClicks()">
                <option value="">Select</option>
                <option value="2.5">2.5 mg</option>
                <option value="5">5 mg</option>
                <option value="7.5">7.5 mg</option>
                <option value="10">10 mg</option>
                <option value="12.5">12.5 mg</option>
                <option value="15">15 mg</option>
            </select>

            <div id="mounjaroResult" class="result-box"></div>

        </div>
    </div>

</div>
    
</div>

<div class="container">
    
<h2>Dose Calculator</h2>

<div class="search-box">
    <input list="medicineList"
           id="medicine"
           placeholder="Search medicine..."
           autocomplete="off">
</div>

<datalist id="medicineList">
<option value="Adol 120mg/5ml Syrup (Paracetamol)">
<option value="Adol 250mg/5ml Syrup (Paracetamol)">
<option value="Adol Drops (Paracetamol)">
<option value="Adol Suppository (Paracetamol)">
<option value="Panadol 240mg/5ml Syrup (Paracetamol)">
<option value="Brufen Syrup (Ibuprofen)">
<option value="Iburon Suppository (Ibuprofen)">
<option value="Dompy Syrup (Domperidone)">
<option value="Hidrasec / Diasec Sachets (Racecadotril)">
<option value="Nomit Syrup (Ondansetron)">
<option value="Zyrtec / Cetralon Syrup (Cetrizine)">
<option value="Zyrtec Drops (Cetrizine)">
<option value="Fenistil Drops (Dimetindene maleate)">
<option value="Sinecod Syrup (Butamirate)">
<option value="Sinecod Drops (Butamirate)">
<option value="Duphalac / Soflax Syrup (Lactulose)">
<option value="Mucum / Ambolar (Ambroxol 15mg/5ml)">
<option value="Mucosolvan (Ambroxol 30mg/5ml)">
<option value="Mucoplexil (Oxomemazine)">
<option value="Claritine Syrup (Loratadine)">
<option value="Fludrex Syrup">
<option value="Toulacough Syrup">   
<option value="Toularynx Thym Syrup">
<option value="Panacough Syrup">
<option value="Les Zamis Cough Syrup">   
<option value="Les Zamis Teething Drops">   
<option value="Les Zamis Reflux Drops">   
<option value="Les Zamis Constipation Drops">   
<option value="Les Zamis Cold & Sinus Drops">   
<option value="Les Zamis Infant Colic Drops">
<option value="Chlorohistol Syrup (Chlorpheniramine)">   
<option value="Aerius / Dora Syrup (Desloratadine)">
<option value="Balsam Syrup">   
<option value="Prospan Syrup">
<option value="Amydramine Syrup">   

</datalist>

<div id="dynamicArea"></div>

<div id="result"></div>

</div>

<script>

let autoWeight = null;
let isManualWeight = false;
    
const medicineInput = document.getElementById("medicine");
const dynamicArea = document.getElementById("dynamicArea");
const result = document.getElementById("result");

medicineInput.addEventListener("input", () => {
    renderInputs();
    calculate();
});

medicineInput.addEventListener("change", () => {
    renderInputs();
    calculate();
});

medicineInput.addEventListener("click", () => {
    if(medicineInput.value !== ""){
        medicineInput.value = "";
        dynamicArea.innerHTML = "";
        result.innerHTML = "";
    }
});
    
function renderInputs(){

    dynamicArea.innerHTML = "";
    result.innerHTML = "";

    const med = medicineInput.value;

     // Weight Based
    if([
        "Adol 120mg/5ml Syrup (Paracetamol)",
        "Adol 250mg/5ml Syrup (Paracetamol)",
        "Adol Drops (Paracetamol)",
        "Adol Suppository (Paracetamol)",
        "Panadol 240mg/5ml Syrup (Paracetamol)",
        "Brufen Syrup (Ibuprofen)",
        "Iburon Suppository (Ibuprofen)",
        "Hidrasec / Diasec Sachets (Racecadotril)",
        "Dompy Syrup (Domperidone)",
        "Nomit Syrup (Ondansetron)"
    ].includes(med))
    {
        let html="";

        if(med==="Adol Drops (Paracetamol)"){
            html+=`
            <label>Calculate By</label>
            <select id="dropMode" onchange="calculate()">
                <option value="ml">mL</option>
                <option value="drops">Drops</option>
            </select>
            `;
        }

       html += `
<div class="small-input-box">
    <label>⚖️ Enter Weight</label>
    <input type="number"
       id="weight"
       step="0.1"
       placeholder="kg"
       oninput="setManualWeight(); calculate();">
</div>
`;

        dynamicArea.innerHTML=html;
    }

    // Age Based
    else if(
        med==="Zyrtec / Cetralon Syrup (Cetrizine)" ||
        med==="Zyrtec Drops (Cetrizine)" ||
        med==="Fenistil Drops (Dimetindene maleate)" ||
        med==="Sinecod Syrup (Butamirate)" ||
        med==="Sinecod Drops (Butamirate)" ||
        med==="Duphalac / Soflax Syrup (Lactulose)" ||
        med==="Mucum / Ambolar (Ambroxol 15mg/5ml)" ||
        med==="Mucosolvan (Ambroxol 30mg/5ml)" ||
        med==="Mucoplexil (Oxomemazine)" ||
        med==="Claritine Syrup (Loratadine)" ||
        med==="Fludrex Syrup" ||
        med==="Toulacough Syrup" ||
        med==="Toularynx Thym Syrup" ||
        med==="Panacough Syrup" ||
        med==="Les Zamis Cough Syrup" ||
        med==="Les Zamis Teething Drops" ||
        med==="Les Zamis Reflux Drops" ||
        med==="Les Zamis Constipation Drops" ||
        med==="Les Zamis Cold & Sinus Drops" ||
        med==="Les Zamis Infant Colic Drops" ||
        med==="Chlorohistol Syrup (Chlorpheniramine)" ||
        med==="Aerius / Dora Syrup (Desloratadine)" ||
        med==="Balsam Syrup" ||
        med==="Prospan Syrup" ||
        med==="Amydramine Syrup"

    )
    {
        dynamicArea.innerHTML=`
        <label>Age Type</label>
        <select id="ageType" onchange="showAgeInput()">
            <option value="">Select Age Type</option>
            <option value="months">Age in Months</option>
            <option value="years">Age in Years</option>
        </select>

        <div id="ageContainer"></div>
        `;
    }
}

function showAgeInput(){

    const ageType = document.getElementById("ageType").value;
    const ageContainer = document.getElementById("ageContainer");

    if(!ageType){
        ageContainer.innerHTML="";
        result.innerHTML="";
        return;
    }

ageContainer.innerHTML=`
<div class="small-input-box">
    <label>👶 Enter Age</label>
    <input type="number"
           id="age"
           step="0.1"
           min="0"
           oninput="calculate()"
           placeholder="${ageType === 'months' ? 'Months' : 'Years'}">
</div>

<div id="claritineWeightContainer"></div>
`;
}

function setManualWeight(){

    let weightInput = document.getElementById("weight");

    if(weightInput.value !== ""){
        isManualWeight = true;
        autoWeight = null;

        let badge = document.getElementById("autoBadge");
        badge.style.display = "inline-block";
        badge.textContent = "MANUAL weight active";
        badge.style.background = "#e74c3c";
    }
}
    
function calculate(){

    const med = medicineInput.value;

    // WEIGHT BASED
    if(document.getElementById("weight")) {

    let weightInput = document.getElementById("weight");

    let w = (autoWeight !== null && autoWeight !== undefined)
        ? autoWeight
        : parseFloat(weightInput.value);

    if(isNaN(w)) {
        result.innerHTML = "";
        return;
    }

        let text="";

        if(med==="Adol 120mg/5ml Syrup (Paracetamol)"){
            let min=(10*w*5/120).toFixed(1);
            let max=(15*w*5/120).toFixed(1);

            text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

</div>
`;
}
        else if(med==="Adol 250mg/5ml Syrup (Paracetamol)"){
            let min=(10*w*5/250).toFixed(1);
            let max=(15*w*5/250).toFixed(1);

            text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

</div>
`;
}
        else if(med==="Adol Drops (Paracetamol)"){

    let dropModeEl = document.getElementById("dropMode");
    let mode = dropModeEl ? dropModeEl.value : "ml";

    let min, max, unit;

    if(mode==="ml"){
        min=(10*w*1/100).toFixed(1);
        max=(15*w*1/100).toFixed(1);
        unit="mL";
    } else {
        min=(10*w*1/100*20).toFixed(0);
        max=(15*w*1/100*20).toFixed(0);
        unit="drops";
    }

    text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} ${unit}</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} ${unit}</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

</div>
`;
}
            
        else if(med==="Adol Suppository (Paracetamol)"){

    let dose = 15 * w;

    if(dose < 125){
    text = `
    <div class="warning-box">
        ❌ Not suitable for Adol Suppository
        <div style="font-size:12px; margin-top:6px; font-weight:normal;">
                   </div>
    </div>
    `;
}
    else if(dose < 250){
        text = `
        <div class="dose-box single-dose">
            <div class="dose-value">Adol 125 mg</div>
            <div class="dose-note">Suppository Q8hr</div>
        </div>
        `;
    }
    else if(dose < 500){
        text = `
        <div class="dose-box single-dose">
            <div class="dose-value">Adol 250 mg</div>
            <div class="dose-note">Suppository Q8hr</div>
        </div>
        `;
    }
    else{
        text = `
        <div class="dose-box single-dose">
            <div class="dose-value">Adol 500 mg</div>
            <div class="dose-note">Suppository Q8hr</div>
        </div>
        `;
    }
}

        else if(med==="Panadol 240mg/5ml Syrup (Paracetamol)"){
            let min=(10*w*5/240).toFixed(1);
            let max=(15*w*5/240).toFixed(1);

            text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

</div>
`;
}
        else if(med==="Brufen Syrup (Ibuprofen)"){
            let min=(5*w*5/100).toFixed(1);
            let max=(10*w*5/100).toFixed(1);

            text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} mL</div>
            <div class="dose-note">Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} mL</div>
            <div class="dose-note">Q8hr</div>
        </div>
    </div>

</div>
`;
}

        else if(med==="Iburon Suppository (Ibuprofen)"){

    let dose = 10 * w;

    if(dose < 75){
    text = `
    <div class="warning-box">
        ❌ Not suitable for Iburon Suppository
        <div style="font-size:12px; margin-top:6px; font-weight:normal;">
                   </div>
    </div>
    `;
}
    else if(dose < 150){
        text = `
        <div class="dose-box single-dose">
            <div class="dose-value">Iburon 75 mg</div>
            <div class="dose-note">Suppository Q8hr</div>
        </div>
        `;
    }
    else if(dose > 149){
        text = `
        <div class="dose-box single-dose">
            <div class="dose-value">Iburon 150 mg</div>
            <div class="dose-note">Suppository Q8hr</div>
        </div>
        `;
    }
}        

        else if(med==="Hidrasec / Diasec Sachets (Racecadotril)"){

    let dose = w;

    if(dose < 9){
         text = `
        <div class="dose-box single-dose">
            <div class="dose-value">Hidrasec 10 mg > 1 sachet TID</div>
            <div class="dose-note">Dissolve in 10-15 ml (water or milk)</div>
        </div>
        
        <div class="warning-box" style="margin-top:10px;">
       Used for 5-7 days (ADD ORS)
        </div>
           `;
}
    else if(dose < 13){
         text = `
        <div class="dose-box single-dose">
            <div class="dose-value">Hidrasec 10 mg > 2 sachets TID</div>
            <div class="dose-note">Dissolve in 10-15 ml (water or milk)</div>
        </div>
        
        <div class="warning-box" style="margin-top:10px;">
       Used for 5-7 days (ADD ORS)
        </div>
           `;
    }
    else if(dose <= 27){
        text = `
        <div class="dose-box single-dose">
            <div class="dose-value">Hidrasec 30 mg > 1 sachet TID</div>
            <div class="dose-note">Dissolve in 10-15 ml (water or milk)</div>

function calculateAverageWeight(){

    let age = parseFloat(document.getElementById("avgAge").value);
    let resultBox = document.getElementById("avgResult");
    let weightInput = document.getElementById("weight");

    if(isNaN(age)){
        resultBox.innerHTML = "";
        autoWeight = null;
        return;
    }

    if (age < 1 || age > 10) {
        resultBox.innerHTML =
        "<span style='color:#b30000'>Used for 1 to 10 years old</span>";
        autoWeight = null;
        return;
    }

    // RESET MANUAL MODE
    isManualWeight = false;

    let weight = (age * 2) + 8;
    autoWeight = weight;

    resultBox.innerHTML =
    "Average Weight: <b>" + weight.toFixed(1) + " kg</b>";

    let badge = document.getElementById("autoBadge");
    badge.style.display = "inline-block";
    badge.textContent = "AUTO weight active";
    badge.style.background = "#0b63ce";

    if(weightInput){
        weightInput.value = weight.toFixed(1);
        calculate();
    }
}

let isCollapsed = true;
function toggleAvgBox(){

    const box = document.getElementById("avgBox");
    const arrow = document.getElementById("arrow");

    isCollapsed = !isCollapsed;

    if(isCollapsed){
        box.classList.add("collapsed");
        arrow.innerHTML = "▶";
    } else {
        box.classList.remove("collapsed");
        arrow.innerHTML = "▼";
    }
}
document.addEventListener("focusin", function(e){
    if(e.target && e.target.id === "weight"){
        e.target.value = "";
        isManualWeight = false;
        autoWeight = null;
        result.innerHTML = "";

        let badge = document.getElementById("autoBadge");
        if(badge){
            badge.style.display = "none";
        }
    }
});

// 2. Custom auto weight event
document.addEventListener("autoWeightUpdate", function(e){
    autoWeight = e.detail;

    calculate();
});

// 3. Collapse avg box when clicking outside
document.addEventListener("click", function (event) {

    const avgBox = document.getElementById("avgBox");
    const mounjaroBox = document.getElementById("mounjaroBox");

    const avgArrow = document.getElementById("arrow");
    const mounjaroArrow = document.getElementById("mounjaroArrow");

    // ===== AVG WIDGET =====
    if (avgBox && !avgBox.contains(event.target)) {

        if (!avgBox.classList.contains("collapsed")) {

            avgBox.classList.add("collapsed");

            if (avgArrow) {
                avgArrow.innerHTML = "▶";
            }
        }
    }

    // ===== MOUNJARO WIDGET =====
    if (mounjaroBox && !mounjaroBox.contains(event.target)) {

        if (!mounjaroBox.classList.contains("collapsed")) {

            mounjaroBox.classList.add("collapsed");

            if (mounjaroArrow) {
                mounjaroArrow.innerHTML = "▶";
            }

            document.getElementById("penStrength").value = "";
            document.getElementById("doseRequired").value = "";
            document.getElementById("mounjaroResult").innerHTML = "";
        }
    }
});

function calculateMounjaroClicks(){

    let pen = parseFloat(document.getElementById("penStrength").value);
    let dose = parseFloat(document.getElementById("doseRequired").value);

    let resultBox = document.getElementById("mounjaroResult");

    if(isNaN(pen) || isNaN(dose)){
        resultBox.innerHTML = "";
        return;
    }

    let clicks = (dose * 60 / pen).toFixed(0);

    resultBox.innerHTML = `= ${clicks} clicks`;
}

let mounjaroCollapsed = true; // start collapsed

function toggleMounjaroBox(){

    const box = document.getElementById("mounjaroBox");
    const arrow = document.getElementById("mounjaroArrow");

    mounjaroCollapsed = !mounjaroCollapsed;

    if(mounjaroCollapsed){
        box.classList.add("collapsed");
        arrow.innerHTML = "▶";

        // RESET
        document.getElementById("penStrength").value = "";
        document.getElementById("doseRequired").value = "";
        document.getElementById("mounjaroResult").innerHTML = "";
    } else {
        box.classList.remove("collapsed");
        arrow.innerHTML = "▼";
    }
}
