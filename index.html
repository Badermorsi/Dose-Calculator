<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pediatric Dose Calculator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#f4f6ff,#eef7ff);
    padding:15px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:15px;
    color:#1f3b73;
}

.input-group {
    margin-top: 12px;
    padding: 14px;
    background: #f7faff;
    border: 1px solid #e6f0ff;
    border-radius: 14px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    font-weight: 600;
    color: #2c3e50;
}

/* unified input look */
.search-box input,
input[type="number"],
select {
    width: 100%;
    padding: 14px 14px;
    border-radius: 14px;
    border: 1px solid #d6e8ff;
    font-size: 15px;
    background: #f9fbff;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
    transition: all 0.25s ease;
}

.search-box{
    width: 92%;
    margin-bottom: 15px;
    position: relative;
}
    
.search-box input:focus,
input[type="number"]:focus,
select:focus {
    border-color: #4a90e2;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(74,144,226,0.15);
    outline: none;
}

/* SEARCH BOX ICON UPGRADE */
.search-box {
    position: relative;
    margin-bottom: 15px;
}

.search-box input {
    padding-left: 42px;
}

.search-box::before {
    content: "💊";
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    opacity: 0.7;
}
    
/* RESULT AREA */
#result{
    margin-top:20px;
}

/* WARNING */
.warning-box{
    background:#ffe5e5;
    border:1px solid #ff4d4d;
    color:#b30000;
    padding:14px;
    border-radius:12px;
    text-align:center;
    font-weight:bold;
}

/* DOSE CARDS */
.dose-grid{
    display:flex;
    gap:12px;
    margin-top:15px;
    flex-wrap:wrap;
}

@media (max-width:600px){
    .dose-column {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
}
}

.dose-column{
    flex:1;
}

.dose-heading {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
    color: #333;
}

.dose-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 12px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.06);
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.dose-value{
    font-size:22px;
    font-weight:bold;
    color:#0b63ce;
    white-space:nowrap;
}

.dose-note{
    margin-top:6px;
    font-size:13px;
    color:#666;
    white-space:nowrap;
}

/* SINGLE CARD */
.single-dose{
    max-width:300px;
    margin:auto;
}

/* REMOVE NUMBER INPUT SPINNERS */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

input[type=number] {
    -moz-appearance: textfield;
}

.small-input-box{
    max-width: 220px;
    margin: 15px auto;
    text-align: center;
}

.small-input-box input{
    text-align: center;
    font-size: 18px;
    font-weight: 600;
}

.small-input-box label{
    text-align: center;
}

.avg-weight-box{
    position: fixed;
    top: 15px;
    left: 15px;

    width: 220px;

    background: white;
    border: 1px solid #d6e8ff;
    border-radius: 14px;
    padding: 10px;
    text-align: center;

    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    z-index: 1000;
}

.avg-weight-box input{
    width: 80%;
    max-width: 140px;
    padding: 4px 6px;
    font-size: 12px;
    border-radius: 6px;
    margin-top: 6px;   /* ✅ fix here */
    display: block;
    margin-left: auto;
    margin-right: auto;
}

.avg-weight-box label{
    font-size: 12px;
    margin-bottom: 4px;
    display: block;
    color: #2c3e50;
}

#avgResult{
    margin-top: 10px;
    font-weight: bold;
    color: #0b63ce;
}
    
</style>
</head>

<body>

<div class="avg-weight-box">
    <h3>Average Child Weight</h3>

    <input type="number"
           id="avgAge"
           placeholder="Age (years)"
           oninput="calculateAverageWeight()">

    <div id="avgResult"></div>
</div>

<div class="container">
    
<h2>Medicine Dose Calculator</h2>

<div class="search-box">
    <input list="medicineList"
           id="medicine"
           placeholder="Search medicine..."
           autocomplete="off">
</div>

<datalist id="medicineList">
<option value="Adol 120mg/5ml Syrup (Paracetamol)">
<option value="Adol 250mg/5ml Syrup (Paracetamol)">
<option value="Adol Drops (Paracetamol)">
<option value="Adol Suppository (Paracetamol)">
<option value="Panadol 240mg/5ml Syrup (Paracetamol)">
<option value="Brufen Syrup (Ibuprofen)">
<option value="Zyrtec / Cetralon Syrup (Cetrizine)">
<option value="Zyrtec Drops (Cetrizine)">
</datalist>

<div id="dynamicArea"></div>

<div id="result"></div>

</div>

<script>

const medicineInput = document.getElementById("medicine");
const dynamicArea = document.getElementById("dynamicArea");
const result = document.getElementById("result");

medicineInput.addEventListener("input", () => {
    renderInputs();
    calculate();
});

medicineInput.addEventListener("change", () => {
    renderInputs();
    calculate();
});

medicineInput.addEventListener("click", () => {
    if(medicineInput.value !== ""){
        medicineInput.value = "";
        dynamicArea.innerHTML = "";
        result.innerHTML = "";
    }
});
    
function renderInputs(){

    dynamicArea.innerHTML = "";
    result.innerHTML = "";

    const med = medicineInput.value;

     // Weight Based
    if([
        "Adol 120mg/5ml Syrup (Paracetamol)",
        "Adol 250mg/5ml Syrup (Paracetamol)",
        "Adol Drops (Paracetamol)",
        "Adol Suppository (Paracetamol)",
        "Panadol 240mg/5ml Syrup (Paracetamol)",
        "Brufen Syrup (Ibuprofen)"
    ].includes(med))
    {
        let html="";

        if(med==="Adol Drops (Paracetamol)"){
            html+=`
            <label>Calculate By</label>
            <select id="dropMode" onchange="calculate()">
                <option value="ml">mL</option>
                <option value="drops">Drops</option>
            </select>
            `;
        }

       html += `
<div class="small-input-box">
    <label>⚖️ Enter Weight</label>
    <input type="number"
           id="weight"
           step="0.1"
           oninput="calculate()"
           placeholder="kg">
</div>
`;

        dynamicArea.innerHTML=html;
    }

    // Age Based
    else if(
        med==="Zyrtec / Cetralon Syrup (Cetrizine)" ||
        med==="Zyrtec Drops (Cetrizine)"
    )
    {
        dynamicArea.innerHTML=`
        <label>Age Type</label>
        <select id="ageType" onchange="showAgeInput()">
            <option value="">Select Age Type</option>
            <option value="months">Age in Months</option>
            <option value="years">Age in Years</option>
        </select>

        <div id="ageContainer"></div>
        `;
    }
}

function showAgeInput(){

    const ageType = document.getElementById("ageType").value;
    const ageContainer = document.getElementById("ageContainer");

    if(!ageType){
        ageContainer.innerHTML="";
        result.innerHTML="";
        return;
    }

    ageContainer.innerHTML=`
<div class="small-input-box">
    <label>👶 Enter Age</label>
    <input type="number"
           id="age"
           step="0.1"
           min="0"
           oninput="calculate()"
           placeholder="${ageType === 'months' ? 'Months' : 'Years'}">
</div>
`;
    
}

function calculate(){

    const med = medicineInput.value;

    // WEIGHT BASED
    if(document.getElementById("weight")){

        let w = parseFloat(document.getElementById("weight").value);

        if(isNaN(w)){
            result.innerHTML="";
            return;
        }

        let text="";

        if(med==="Adol 120mg/5ml Syrup (Paracetamol)"){
            let min=(10*w*5/120).toFixed(1);
            let max=(15*w*5/120).toFixed(1);

            text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

</div>
`;
}
        else if(med==="Adol 250mg/5ml Syrup (Paracetamol)"){
            let min=(10*w*5/250).toFixed(1);
            let max=(15*w*5/250).toFixed(1);

            text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

</div>
`;
}
        else if(med==="Adol Drops (Paracetamol)"){

    let dropModeEl = document.getElementById("dropMode");
    let mode = dropModeEl ? dropModeEl.value : "ml";

    let min, max, unit;

    if(mode==="ml"){
        min=(10*w*1/100).toFixed(1);
        max=(15*w*1/100).toFixed(1);
        unit="mL";
    } else {
        min=(10*w*1/100*20).toFixed(0);
        max=(15*w*1/100*20).toFixed(0);
        unit="drops";
    }

    text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} ${unit}</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} ${unit}</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

</div>
`;
}
            
        else if(med==="Adol Suppository (Paracetamol)"){

            let dose=15*w;

            if(dose<125){
                text="Can't use Adol Suppository";
            }
            else if(dose<250){
                text="Adol 125mg Suppository Q8hr";
            }
            else if(dose<500){
                text="Adol 250mg Suppository Q8hr";
            }
            else{
                text="Adol 500mg Suppository Q8hr";
            }
        }

        else if(med==="Panadol 240mg/5ml Syrup (Paracetamol)"){
            let min=(10*w*5/240).toFixed(1);
            let max=(15*w*5/240).toFixed(1);

            text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

</div>
`;
}
        else if(med==="Brufen Syrup (Ibuprofen)"){
            let min=(5*w*5/100).toFixed(1);
            let max=(10*w*5/100).toFixed(1);

            text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} mL</div>
            <div class="dose-note">Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} mL</div>
            <div class="dose-note">Q8hr</div>
        </div>
    </div>

</div>
`;
}
        result.innerHTML=text;
    }

    // AGE BASED
    if(document.getElementById("age")){

        let age=parseFloat(document.getElementById("age").value);
        let ageTypeElement=document.getElementById("ageType");

        if(!ageTypeElement) return;

        let type=ageTypeElement.value;

        if(!type) return;

        if(isNaN(age)){
            result.innerHTML="";
            return;
        }

        let months=(type==="years") ? age*12 : age;

        let text="";

        if(med==="Zyrtec / Cetralon Syrup (Cetrizine)"){

            if(months<24){
                result.innerHTML=`
                <div class="warning-box">
                Not recommended unless prescribed by a doctor
                </div>
                `;
                return;
            }
            else if(months<72){
                text = `
<div class="dose-box single-dose">
    <div class="dose-value">2.5 mL OD</div>
    <div class="dose-note">Maximum 5 mL OD</div>
</div>
`;
        } 
                
            else if(months<144){
                text = `
<div class="dose-box single-dose">
    <div class="dose-value">5 mL OD</div>
    <div class="dose-note">Maximum 10 mL OD</div>
</div>
`;
                
       }         
            else{
                text = `
<div class="dose-box single-dose">
    <div class="dose-value">10 mL OD</div>
</div>
`;
            }
        }

        else if(med==="Zyrtec Drops (Cetrizine)"){

            if(months<6){
                result.innerHTML=`
                <div class="warning-box">
                Not recommended unless prescribed by a doctor
                </div>
                `;
                return;
            }
            else if(months<24){
                 text = `
<div class="dose-box single-dose">
    <div class="dose-value">5 drops OD</div>
</div>
`;
            }
            else if(months<72){
                text = `
<div class="dose-box single-dose">
    <div class="dose-value">5 drops OD</div>
    <div class="dose-note">Maximum 10 drops OD</div>
</div>
`;
            }
            else if(months<144){
                text = `
<div class="dose-box single-dose">
    <div class="dose-value">10 drops OD</div>
    <div class="dose-note">Maximum 20 drops OD</div>
</div>
`;
            }
            else{
                text = `
<div class="dose-box single-dose">
    <div class="dose-value">20 drops OD</div>
</div>
`;
            }
        }

        result.innerHTML=text;
    }
}

function calculateAverageWeight(){

    let age = parseFloat(document.getElementById("avgAge").value);
    let resultBox = document.getElementById("avgResult");

    if(isNaN(age)){
        resultBox.innerHTML = "";
        return;
    }

    if(age > 10){
        resultBox.innerHTML =
        "<span style='color:red'>Ask customer for weight</span>";
        return;
    }

    let weight = (age * 2) + 8;

    resultBox.innerHTML =
    "Average Weight: <b>" + weight.toFixed(1) + " kg</b>";
}
    
</script>

</body>
</html>
