<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pediatric Dose Calculator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#f4f6ff,#eef7ff);
    padding:15px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:15px;
    color:#1f3b73;
}

.search-box input {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    border: 2px solid #d6e8ff;
    border-radius: 12px;
    outline: none;
    transition: 0.2s ease-in-out;
}

.search-box input:focus {
    border-color: #4a90e2;
    box-shadow: 0 0 10px rgba(74,144,226,0.25);
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
    box-sizing: border-box;
}

/* RESULT AREA */
#result{
    margin-top:20px;
}

/* WARNING */
.warning-box{
    background:#ffe5e5;
    border:1px solid #ff4d4d;
    color:#b30000;
    padding:14px;
    border-radius:12px;
    text-align:center;
    font-weight:bold;
}

/* DOSE CARDS */
.dose-grid{
    display:flex;
    gap:12px;
    margin-top:15px;
    flex-wrap:wrap;
}

@media (max-width:600px){
    .dose-column{
        flex:100%;
    }
}

.dose-column{
    flex:1;
}

.dose-heading{
    text-align:center;
    font-weight:bold;
    margin-bottom:6px;
    color:#333;
}

.dose-box {
    animation: fadeUp 0.3s ease-out;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.dose-value{
    font-size:22px;
    font-weight:bold;
    color:#0b63ce;
    white-space:nowrap;
}

.dose-note{
    margin-top:6px;
    font-size:13px;
    color:#666;
    white-space:nowrap;
}

/* SINGLE CARD */
.single-dose{
    max-width:300px;
    margin:auto;
}

/* REMOVE NUMBER INPUT SPINNERS */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

input[type=number] {
    -moz-appearance: textfield;
}
    
</style>
</head>
<body>

<div class="container">

<h2>Medicine Dose Calculator</h2>

<div class="search-box">
    <input list="medicineList"
           id="medicine"
           placeholder="Search medicine..."
           autocomplete="off">
</div>

<datalist id="medicineList">
<option value="Adol 120mg/5ml Syrup">
<option value="Adol 250mg/5ml Syrup">
<option value="Adol Drops">
<option value="Adol Suppository">
<option value="Panadol 240mg/5ml Syrup">
<option value="Brufen Syrup">
<option value="Zyrtec / Cetralon Syrup">
<option value="Zyrtec Drops">
</datalist>

<div id="dynamicArea"></div>

<div id="result"></div>

</div>

<script>

const medicineInput = document.getElementById("medicine");
const dynamicArea = document.getElementById("dynamicArea");
const result = document.getElementById("result");

medicineInput.addEventListener("input", () => {
    renderInputs();
    calculate();
});

medicineInput.addEventListener("change", () => {
    renderInputs();
    calculate();
});

function renderInputs(){

    dynamicArea.innerHTML = "";
    result.innerHTML = "";

    const med = medicineInput.value;

     // Weight Based
    if([
        "Adol 120mg/5ml Syrup",
        "Adol 250mg/5ml Syrup",
        "Adol Drops",
        "Adol Suppository",
        "Panadol 240mg/5ml Syrup",
        "Brufen Syrup"
    ].includes(med))
    {
        let html="";

        if(med==="Adol Drops"){
            html+=`
            <label>Calculate By</label>
            <select id="dropMode" onchange="calculate()">
                <option value="ml">mL</option>
                <option value="drops">Drops</option>
            </select>
            `;
        }

        html+=`
        <label>Weight (kg)</label>
        <input type="number" id="weight" step="0.1" oninput="calculate()">
        `;

        dynamicArea.innerHTML=html;
    }

    // Age Based
    else if(
        med==="Zyrtec / Cetralon Syrup" ||
        med==="Zyrtec Drops"
    )
    {
        dynamicArea.innerHTML=`
        <label>Age Type</label>
        <select id="ageType" onchange="showAgeInput()">
            <option value="">Select Age Type</option>
            <option value="months">Age in Months</option>
            <option value="years">Age in Years</option>
        </select>

        <div id="ageContainer"></div>
        `;
    }
}

function showAgeInput(){

    const ageType = document.getElementById("ageType").value;
    const ageContainer = document.getElementById("ageContainer");

    if(!ageType){
        ageContainer.innerHTML="";
        result.innerHTML="";
        return;
    }

    ageContainer.innerHTML=`
        <label>Enter Age</label>
        <input type="number"
               id="age"
               step="0.1"
               min="0"
               oninput="calculate()">
    `;
}

function calculate(){

    const med = medicineInput.value;

    // WEIGHT BASED
    if(document.getElementById("weight")){

        let w = parseFloat(document.getElementById("weight").value);

        if(isNaN(w)){
            result.innerHTML="";
            return;
        }

        let text="";

        if(med==="Adol 120mg/5ml Syrup"){
            let min=(10*w*5/120).toFixed(1);
            let max=(15*w*5/120).toFixed(1);

            text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

</div>
`;
}
        else if(med==="Adol 250mg/5ml Syrup"){
            let min=(10*w*5/250).toFixed(1);
            let max=(15*w*5/250).toFixed(1);

            text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

</div>
`;
}
        else if(med==="Adol Drops"){

    let dropModeEl = document.getElementById("dropMode");
    let mode = dropModeEl ? dropModeEl.value : "ml";

    let min, max, unit;

    if(mode==="ml"){
        min=(10*w*1/100).toFixed(1);
        max=(15*w*1/100).toFixed(1);
        unit="mL";
    } else {
        min=(10*w*1/100*20).toFixed(0);
        max=(15*w*1/100*20).toFixed(0);
        unit="drops";
    }

    text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} ${unit}</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} ${unit}</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

</div>
`;
}
            
        else if(med==="Adol Suppository"){

            let dose=15*w;

            if(dose<125){
                text="Can't use Adol Suppository";
            }
            else if(dose<250){
                text="Adol 125mg Suppository Q8hr";
            }
            else if(dose<500){
                text="Adol 250mg Suppository Q8hr";
            }
            else{
                text="Adol 500mg Suppository Q8hr";
            }
        }

        else if(med==="Panadol 240mg/5ml Syrup"){
            let min=(10*w*5/240).toFixed(1);
            let max=(15*w*5/240).toFixed(1);

            text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} mL</div>
            <div class="dose-note">Q6hr / Q8hr</div>
        </div>
    </div>

</div>
`;
}
        else if(med==="Brufen Syrup"){
            let min=(5*w*5/100).toFixed(1);
            let max=(10*w*5/100).toFixed(1);

            text = `
<div class="dose-grid">

    <div class="dose-column">
        <div class="dose-heading">Minimum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${min} mL</div>
            <div class="dose-note">Q8hr</div>
        </div>
    </div>

    <div class="dose-column">
        <div class="dose-heading">Maximum Dose</div>
        <div class="dose-box">
            <div class="dose-value">${max} mL</div>
            <div class="dose-note">Q8hr</div>
        </div>
    </div>

</div>
`;
}
        result.innerHTML=text;
    }

    // AGE BASED
    if(document.getElementById("age")){

        let age=parseFloat(document.getElementById("age").value);
        let ageTypeElement=document.getElementById("ageType");

        if(!ageTypeElement) return;

        let type=ageTypeElement.value;

        if(!type) return;

        if(isNaN(age)){
            result.innerHTML="";
            return;
        }

        let months=(type==="years") ? age*12 : age;

        let text="";

        if(med==="Zyrtec / Cetralon Syrup"){

            if(months<24){
                result.innerHTML=`
                <div class="warning-box">
                Not recommended unless prescribed by a doctor
                </div>
                `;
                return;
            }
            else if(months<72){
                text = `
<div class="dose-box single-dose">
    <div class="dose-value">2.5 mL OD</div>
    <div class="dose-note">Maximum 5 mL OD</div>
</div>
`;
        } 
                
            else if(months<144){
                text = `
<div class="dose-box single-dose">
    <div class="dose-value">5 mL OD</div>
    <div class="dose-note">Maximum 10 mL OD</div>
</div>
`;
                
       }         
            else{
                text = `
<div class="dose-box single-dose">
    <div class="dose-value">10 mL OD</div>
</div>
`;
            }
        }

        else if(med==="Zyrtec Drops"){

            if(months<6){
                result.innerHTML=`
                <div class="warning-box">
                Not recommended unless prescribed by a doctor
                </div>
                `;
                return;
            }
            else if(months<24){
                 text = `
<div class="dose-box single-dose">
    <div class="dose-value">5 drops OD</div>
</div>
`;
            }
            else if(months<72){
                text = `
<div class="dose-box single-dose">
    <div class="dose-value">5 drops OD</div>
    <div class="dose-note">Maximum 10 drops OD</div>
</div>
`;
            }
            else if(months<144){
                text = `
<div class="dose-box single-dose">
    <div class="dose-value">10 drops OD</div>
    <div class="dose-note">Maximum 20 drops OD</div>
</div>
`;
            }
            else{
                text = `
<div class="dose-box single-dose">
    <div class="dose-value">20 drops OD</div>
</div>
`;
            }
        }

        result.innerHTML=text;
    }
}

</script>

</body>
</html>
